# Glassbook · CI
# 每次 push / PR 都跑 xcodegen + 单元测试,保底 279 个测试全绿。
# Watch target 需要 watchOS 11.x SDK,CI 机器通常没装,所以用 GlassbookCI scheme
# (只包含 iOS + Tests,跳过 Watch)。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + Test (GlassbookCI)
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Glassbook

    steps:
      - uses: actions/checkout@v4

      # macos-15 自带 Xcode 16 + iOS 18 模拟器 runtime · 用 setup-xcode 取
      # 单独的 16.0 反而拿到不带 simulator 的精简版,会报 "iOS 18.0 is not
      # installed"。直接走 latest-stable 让 action 选已装 runtime 的版本。
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen
        working-directory: .

      - name: Generate project
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        run: |
          # CI runners' simulator names drift, pick the first available iPhone
          # simulator instead of hard-coding "iPhone 15".
          DEVICE=$(xcrun simctl list devices available | grep -oE "iPhone [0-9]+( Pro)?( Max)?" | head -1)
          echo "DEVICE=$DEVICE" >> $GITHUB_ENV
          echo "Using $DEVICE"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme GlassbookCI \
            -destination "platform=iOS Simulator,name=${DEVICE}" \
            -resultBundlePath TestResults.xcresult \
            | xcpretty
        env:
          NSUnbufferedIO: YES

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Glassbook/TestResults.xcresult
          retention-days: 7
